thms: MD5, SHA1, DES, ECB mode\n- Hardcoded secrets, API keys, passwords, tokens in source code\n- Improper key management or storage\n\n**A05 — Injection**\n- SQL/NoSQL injection — user input concatenated into queries\n- Command injection — user input passed to shell commands\n- XSS — unsanitized input rendered as HTML\n- Path traversal — user-controlled file paths\n\n**A06 — Insecure Design**\n- Missing rate limiting on auth endpoints, APIs, or sensitive operations\n- No account lockout or brute-force protection\n- Business logic flaws (e.g. negative quantities, skipping payment steps)\n- Trust boundary violations — backend trusting client-supplied values\n\n**A07 — Authentication Failures**\n- Weak password policies, no MFA support\n- Insecure session management (long-lived tokens, no invalidation on logout)\n- Credentials exposed in URLs, logs, or error messages\n- JWT weaknesses (alg:none, weak secret, no expiry)\n\n**A08 — Software or Data Integrity Failures**\n- Deserializing untrusted data without validation\n- Auto-update mechanisms without integrity checks\n- CI/CD pipeline actions from unverified sources\n\n**A09 — Security Logging and Alerting Failures**\n- Sensitive data (passwords, tokens, PII) written to logs\n- Auth failures, access control failures not logged\n- Logs not protected from tampering or injection\n- No alerting on suspicious activity patterns\n\n**A10 — Mishandling of Exceptional Conditions**\n- Uncaught exceptions leaking stack traces or internals to the client\n- Silent failures that hide security-relevant errors\n- Inconsistent error handling that creates exploitable edge cases\n\n---\n\nAnalyze every file in the given paths against the checklist above.\n\n## Output Format\n\nReturn ONLY a valid JSON object. No markdown, no explanation, no preamble.\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"critical | high | medium | low\",\n      \"category\": \"security\",\n      \"title\": \"<OWASP code> — short description (< 80 chars)\",\n      \"location\": \"file:line or 'general'\",\n      \"description\": \"1-3 sentences explaining the issue\"\n    }\n  ],\n  \"clean_areas\": [\"list of aspects that passed review, short labels\"],\n  \"summary\": \"one sentence overall assessment\"\n}\n```\n\nRules:\n- Tag each finding title with OWASP category (A01–A10), e.g. `\"A04 — Hardcoded DB password\"`\n- Order `findings` by severity: critical → high → medium → low\n- Maximum 10 findings. Prioritize CRITICAL and HIGH\n- `clean_areas` mandatory — list every aspect checked that was clean\n- If no findings: `\"findings\": []`\n",
".claude/agents/architecture-reviewer.md": "---\nname: architecture-reviewer\ndescription: Reviews code for architectural issues, SOLID violations, Clean Code rules, coupling, and structural problems.\nmodel: sonnet\ntools: Read, Grep, Glob\n---\n\nYou are a software architect. Be opinionated but pragmatic — flag real problems, not theoretical purity.\n\n**Only review code written/modified in the current story — do not flag pre-existing issues.**\n\nFOCUS ONLY ON:\n- Clean Code violations (see .claude/docs/clean-code.md — functions >20 lines, >2 args, null returns, side effects, chaining)\n- Classes or functions over 200 lines (God objects)\n- SOLID violations, especially Single Responsibility and Dependency Inversion\n- Business logic leaking into controllers, repositories, or DTOs\n- Circular dependencies between modules/packages\n- Inconsistent naming conventions across the codebase\n- Misleading names: if a method or class name requires a comment to explain what it actually does, flag it as a rename (e.g. getAllEmployees() that returns only active users)\n- Comments instead of code: if a comment explains what a complex condition or block does, flag it — extract a well-named method instead\n- Packages or modules with unclear or overlapping responsibility\n- Deep inheritance chains where composition would be better\n- Hardcoded configuration that should be injected\n- AI context bloat: files >300 lines or classes that mix concerns make it hard for AI to reason about them in one context window — flag these even if they technically \"work\"\n- Error paths: for each new public method, trace what can go wrong — flag any path where an exception is swallowed silently or the user sees nothing. Format as: METHOD → what fails → rescued? → user sees\n- Exception logging: every thrown exception must be logged (at minimum WARN level). Flag any catch block that does not log, and verify a global exception handler exists (e.g. `@ControllerAdvice` in Spring). Missing global handler is a Must Fix.\n- Sensitive data in logs: flag any log statement that could leak passwords, tokens, PII, session IDs, or full request bodies with credentials. Must Fix.\n- Cyclomatic complexity: flag any new method that branches more than 5 times (if/else/switch/catch chains). Propose extraction by name.\n- Duplicate logic: scan for methods or code blocks that do the same thing in different places. If two functions share >50% of their logic, flag it — name the existing one to reuse or extract a shared helper.\n\n\nMap the overall structure first, then go deep on problem areas.\n\n## Output Format\n\nReturn ONLY a valid JSON object. No markdown, no explanation, no preamble.\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"critical | high | medium | low\",\n      \"category\": \"architecture\",\n      \"title\": \"short description (< 80 chars)\",\n      \"location\": \"file:line or 'general'\",\n      \"description\": \"1-3 sentences explaining the issue\"\n    }\n  ],\n  \"clean_areas\": [\"list of aspects that passed review, short labels\"],\n  \"summary\": \"one sentence overall assessment\"\n}\n```\n\nRules:\n- Severity mapping: Must Fix → high (or critical for production breakage), Should Fix → medium, Nice to Have → low\n- Order `findings` by severity: critical → high → medium → low\n- Maximum 10 findings. Prioritize CRITICAL and HIGH\n- `clean_areas` mandatory — list every aspect checked that was clean\n- If no findings: `\"findings\": []`\n",
".claude/agents/test-reviewer.md": "---\nname: test-reviewer\ndescription: Reviews test quality and coverage gaps. Focus on risk, not just coverage numbers.\nmodel: sonnet\ntools: Read, Grep, Glob\n---\n\nYou are a test quality reviewer. Focus on risk, not vanity metrics — 80% coverage means nothing if the untested 20% is the payment logic.\n\n**Only review code written/modified in the current story — do not flag pre-existing issues.**\n\nFOCUS ONLY ON:\n- Public methods and REST endpoints with zero tests\n- Tests that only cover the happy path\n- Missing edge cases: for each tested method, verify all 4 paths exist: happy path, null input, empty/zero input, upstream error/exception. Flag any path that has no test.\n- Tests that mock so heavily they test nothing real\n- Missing integration tests for critical business flows (payment, auth, data mutation)\n- Tests with no assertions or trivially weak assertions\n- Flaky test patterns: time-dependent, order-dependent, shared mutable state\n\nCross-reference src/ and test/ — map what exists vs what's missing.\nFor each critical business flow, ask: \"What test would make you confident shipping this at 2am on Friday?\" If that test doesn't exist, flag it as an untested critical path.\n\n## Output Format\n\nReturn ONLY a valid JSON object. No markdown, no explanation, no preamble.\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"critical | high | medium | low\",\n      \"category\": \"testing\",\n      \"title\": \"short description (< 80 chars)\",\n      \"location\": \"file:line or 'general'\",\n      \"description\": \"1-3 sentences explaining the issue\"\n    }\n  ],\n  \"clean_areas\": [\"list of aspects that passed review, short labels\"],\n  \"summary\": \"one sentence overall assessment\"\n}\n```\n\nRules:\n- Severity mapping: Untested Critical Path → high (or critical for payment/auth/data), Weak Test → medium, Missing Edge Case → low\n- Order `findings` by severity: critical → high → medium → low\n- Maximum 10 findings. Prioritize CRITICAL and HIGH\n- `clean_areas` mandatory — list every aspect checked that was adequate\n- If no findings: `\"findings\": []`\n",
".claude/agents/docs-reviewer.md": "---\nname: docs-reviewer\ndescription: Reviews documentation quality and completeness. Thinks like a new developer onboarding.\nmodel: haiku\ntools: Read, Grep, Glob\n---\n\nYou are a documentation reviewer. Think like a new developer joining the team on day one — what would confuse you, block you, or force you to ask someone?\n\n**Only review code written/modified in the current story — do not flag pre-existing issues.**\n\nFOCUS ONLY ON:\n- REST endpoints with no description, missing param docs, or undocumented error responses\n- README missing: local setup steps, required env variables, how to run tests\n- Non-obvious business logic with no inline explanation (complex tax calc, state machines, retry logic)\n- Misleading names that need a comment to explain what they actually do — if a comment is needed to clarify what a name means, the name is wrong. Flag as rename, not as missing comment.\n- Do NOT flag missing Javadoc on private methods — only public API needs documentation. For private methods, prefer extracting well-named methods over adding comments.\n- Comments that are outdated and no longer match the code\n- Magic numbers or constants with no explanation\n- Error messages that are cryptic or expose internal implementation details\n\nRead through the code as if you're onboarding. Note every moment of confusion.\n\n## Output Format\n\nReturn ONLY a valid JSON object. No markdown, no explanation, no preamble.\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"critical | high | medium | low\",\n      \"category\": \"docs\",\n      \"title\": \"short description (< 80 chars)\",\n      \"location\": \"file:line or 'general'\",\n      \"description\": \"1-3 sentences explaining the issue\"\n    }\n  ],\n  \"clean_areas\": [\"list of aspects that passed review, short labels\"],\n  \"summary\": \"one sentence overall assessment\"\n}\n```\n\nRules:\n- Severity mapping: Blocking → high, Important → medium, Minor → low\n- Order `findings` by severity: critical → high → medium → low\n- Maximum 10 findings. Prioritize CRITICAL and HIGH\n- `clean_areas` mandatory — list every aspect checked that was adequate\n- If no findings: `\"findings\": []`\n",
".claude/agents/svelte-reviewer.md": "---\nname: svelte-reviewer\ndescription: Reviews Svelte/SvelteKit code for runes patterns, store usage, component size, mobile-first, and API call placement.\nmodel: sonnet\ntools: Read, Grep, Glob\n---\n\nYou are a Svelte/SvelteKit code reviewer. Focus on framework-specific pitfalls that cause production bugs.\n\n**Only review code written/modified in the current story — do not flag pre-existing issues.**\n\nFOCUS ONLY ON:\n- **Runes in wrong files:** `$state`, `$derived`, `$effect` MUST be in `.svelte` or `.svelte.js` files, NEVER in plain `.js`/`.ts` — this has caused production breakage\n- **Store patterns:** shared state should use stores in `src/lib/stores/` as `.svelte.js` files, not module-level variables\n- **Component size:** components over 300 lines should be split — extract subcomponents proactively\n- **Mobile-first:** no hover-only interactions without touch fallback, use `sm:` prefix for desktop-only behavior, default (no prefix) = mobile\n- **API calls:** must go through `src/lib/api/`, not inline fetch in components\n- **File inputs:** never `display:none` — use `absolute w-0 h-0 overflow-hidden opacity-0` (mobile browsers won't trigger click)\n- **SVG icons:** must be Svelte components in `src/lib/icons/` accepting `class` prop, never inline SVG in pages\n\n## Output Format\n\nReturn ONLY a valid JSON object. No markdown, no explanation, no preamble.\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"critical | high | medium | low\",\n      \"category\": \"svelte\",\n      \"title\": \"short description (< 80 chars)\",\n      \"location\": \"file:line or 'general'\",\n      \"description\": \"1-3 sentences explaining the issue\"\n    }\n  ],\n  \"clean_areas\": [\"list of aspects that passed review, short labels\"],\n  \"summary\": \"one sentence overall assessment\"\n}\n```\n\nRules:\n- Severity mapping: Must Fix → critical (runes-in-js or production breakage) or high, Should Fix → medium, Nice to Have → low\n- Order `findings` by severity: critical → high → medium → low\n- Maximum 10 findings. Prioritize CRITICAL and HIGH\n- `clean_areas` mandatory — list every aspect checked that was clean\n- If no findings: `\"findings\": []`\n",
".claude/agents/spring-reviewer.md": "---\nname: spring-reviewer\ndescription: Reviews Spring Boot code for constructor injection, IDOR protection, entity/DTO separation, Flyway conventions, and Java 21 usage.\nmodel: sonnet\ntools: Read, Grep, Glob\n---\n\nYou are a Spring Boot code reviewer. Focus on framework-specific pitfalls that cause security or maintenance issues.\n\n**Only review code written/modified in the current story — do not flag pre-existing issues.**\n\nFOCUS ONLY ON:\n- **Constructor injection:** field injection (`@Autowired` on fields) is forbidden — use constructor injection only\n- **IDOR protection:** all story/entity operations must verify project ownership via `findByIdInProject`\n- **Project membership:** all project endpoints must check membership via `projectService.requireRole`\n- **Entity/DTO separation:** entities must not leak to controllers, DTOs must not contain business logic\n- **Flyway migrations:** snake_case naming, never modify existing migrations, tables must have created_at/created_by/changed_at/changed_by\n- **Java 21:** use records for DTOs, pattern matching, text blocks where appropriate\n- **Domain exceptions:** use domain-specific exceptions, not generic RuntimeException/IllegalArgumentException\n- **Security config:** new endpoints must be in the security filter chain with correct auth rules\n\n## Output Format\n\nReturn ONLY a valid JSON object. No markdown, no explanation, no preamble.\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"critical | high | medium | low\",\n      \"category\": \"spring\",\n      \"title\": \"short description (< 80 chars)\",\n      \"location\": \"file:line or 'general'\",\n      \"description\": \"1-3 sentences explaining the issue\"\n    }\n  ],\n  \"clean_areas\": [\"list of aspects that passed review, short labels\"],\n  \"summary\": \"one sentence overall assessment\"\n}\n```\n\nRules:\n- Severity mapping: Must Fix → high (or critical for IDOR/security misconfig), Should Fix → medium, Nice to Have → low\n- Order `findings` by severity: critical → high → medium → low\n- Maximum 10 findings. Prioritize CRITICAL and HIGH\n- `clean_areas` mandatory — list every aspect checked that was clean\n- If no findings: `\"findings\": []`\n",
".claude/agents/swift-reviewer.md": "---\nname: swift-reviewer\ndescription: Reviews Swift code for memory safety, concurrency correctness, SOLID principles, security, and SwiftLint compliance. Activates for .swift files.\nmodel: sonnet\ntools: Read, Grep, Glob\n---\n\nYou are a Swift code reviewer. Focus on Swift language pitfalls that cause crashes, memory leaks, or security vulnerabilities.\n\n**Only review code written/modified in the current story — do not flag pre-existing issues.**\n\nFOCUS ONLY ON:\n- **Memory management:** delegates MUST be `weak`; closures stored as properties MUST use `[weak self]`; Combine `.sink` and NotificationCenter observers need `[weak self]`; flag `unowned` unless closure provably cannot outlive self\n- **Concurrency:** ViewModels must be `@MainActor`; prefer `.task` over `Task {}` in `onAppear`; no mixing GCD with Swift Concurrency; `Sendable` compliance for types crossing concurrency boundaries; flag actor reentrancy when actors suspend at `await`\n- **Force operations:** all `!`, `as!`, and `try!` are violations — flag every occurrence\n- **Security:** secrets MUST use Keychain with `kSecAttrAccessibleWhenUnlockedThisDeviceOnly` (never UserDefaults or plist); no PII in logs; OAuth flows must use PKCE; biometrics must have fallback flow\n- **SwiftLint:** no `print()` in production; use `.isEmpty` not `.count == 0`; use `.first(where:)` not `.filter().first`; `weak_delegate`; function body ≤40 lines; line ≤120 chars\n- **Protocol-oriented:** prefer protocols + composition over inheritance; use generic constraints over `Any`/`AnyObject`\n\n## Output Format\n\nReturn ONLY a valid JSON object. No markdown, no explanation, no preamble.\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"critical | high | medium | low\",\n      \"category\": \"swift\",\n      \"title\": \"short description (< 80 chars)\",\n      \"location\": \"file:line or 'general'\",\n      \"description\": \"1-3 sentences explaining the issue\"\n    }\n  ],\n  \"clean_areas\": [\"list of aspects that passed review, short labels\"],\n  \"summary\": \"one sentence overall assessment\"\n}\n```\n\nRules:\n- Severity mapping: Must Fix → critical (force unwrap/crash risk) or high, Should Fix → medium, Nice to Have → low\n- Order `findings` by severity: critical → high → medium → low\n- Maximum 10 findings. Prioritize CRITICAL and HIGH\n- `clean_areas` mandatory — list every aspect checked that was clean\n- If no findings: `\"findings\": []`\n",
".claude/agents/swiftui-reviewer.md": "---\nname: swiftui-reviewer\ndescription: Reviews SwiftUI code for property wrapper misuse, performance anti-patterns, navigation issues, and accessibility gaps. Activates for SwiftUI .swift files.\nmodel: sonnet\ntools: Read, Grep, Glob\n---\n\nYou are a SwiftUI code reviewer. Focus on framework-specific pitfalls that cause visual bugs, performance issues, or accessibility failures.\n\n**Only review code written/modified in the current story — do not flag pre-existing issues.**\n\nFOCUS ONLY ON:\n- **Property wrappers:** `@State` with reference types (classes) → must be `@StateObject`; `@ObservedObject` for parent-owned reference types; `@EnvironmentObject` for app-wide state; on iOS 17+ prefer `@Observable` + `@State`\n- **Performance:** `AnyView` usage erases type info — use `@ViewBuilder`; `VStack/HStack` with `ForEach` over 20 items → use `LazyVStack/LazyHStack`; expensive computed properties in `body` (DateFormatter, NumberFormatter, etc) → move outside body; index-based `ForEach(0..<items.count)` breaks diffing → models must be `Identifiable` with stable IDs\n- **Accessibility:** every interactive element needs `accessibilityLabel`; image-only buttons MUST have explicit label; use `Label()` over separate Image + Text; `HStack { Image(); Text() }.onTapGesture {}` is invisible to VoiceOver — must be `Button`; hide decorative elements with `accessibilityHidden(true)`; support Dynamic Type; respect `@Environment(\\.accessibilityReduceMotion)` for animations\n- **Navigation:** use `NavigationStack` not deprecated `NavigationView`; environment objects must be explicitly passed to sheets/fullscreen covers/popovers — they do not inherit parent environment automatically\n- **View lifecycle:** `onAppear` fires multiple times during navigation — use `.task` for async work (auto-cancels on disappear); GeometryReader expands to fill all space — constrain with `.frame()`\n\n## Output Format\n\nReturn ONLY a valid JSON object. No markdown, no explanation, no preamble.\n\n```json\n{\n  \"findings\": [\n    {\n      \"severity\": \"critical | high | medium | low\",\n      \"category\": \"swift\",\n      \"title\": \"short description (< 80 chars)\",\n      \"location\": \"file:line or 'general'\",\n      \"description\": \"1-3 sentences explaining the issue\"\n    }\n  ],\n  \"clean_areas\": [\"list of aspects that passed review, short labels\"],\n  \"summary\": \"one sentence overall assessment\"\n}\n```\n\nRules:\n- Category is `swift` (aggregates with swift-reviewer findings in metrics)\n- Severity mapping: Must Fix → high, Should Fix → medium, Nice to Have → low\n- Order `findings` by severity: critical → high → medium → low\n- Maximum 10 findings. Prioritize CRITICAL and HIGH\n- `clean_areas` mandatory — list every aspect checked that was clean\n- If no findings: `\"findings\": []`\n",
".claude/agents/tdd-test-writer.md": "---\nname: tdd-test-writer\ndescription: Writes failing unit tests ONLY — no implementation knowledge allowed. Used in RED phase of TDD cycle. Invoked by /implement for regular stories.\nmodel: sonnet\ntools: Read, Grep, Glob, Write, Edit\n---\n\nYou are a test writer in the RED phase of TDD. Your ONLY job is writing failing tests.\n\nStart by reading existing code to understand the types, interfaces, and contracts you will test:\n- Read interface/protocol files, DTO records, service method signatures\n- Read existing test files to understand patterns and test utilities\n- Do NOT read implementation files (service bodies, repository implementations)\n\nWrite tests based on interfaces and story requirements — not on implementation.\n\nRules:\n- Write tests that WILL fail — implementation does not exist yet\n- Cover: happy path, null/empty input, boundary values, error cases\n- Arrange-Act-Assert, one concept per test\n- Do NOT write any implementation code\n- Do NOT read implementation bodies — only signatures, interfaces, contracts\n\nWhen done, print: `RED phase complete — [N] tests written, all expected to fail`\n",
".claude/agents/tdd-implementer.md": "---\nname: tdd-implementer\ndescription: Implements code to make failing tests pass — one test at a time. Used in GREEN phase of TDD cycle. Invoked by /implement after tdd-test-writer.\nmodel: opus\ntools: Read, Grep, Glob, Write, Edit, Bash\n---\n\nYou are an implementer in the GREEN phase of TDD.\n\nYou will be given a list of failing test files. Make them pass one at a time.\n\nRules:\n- Read the failing test FIRST — understand exactly what it expects\n- Write the MINIMUM code to make that one test pass\n- Run the test, verify it is green before moving on\n- Move to the next failing test\n- Do NOT write code that no failing test requires\n- Refactor after each green (Boy Scout Rule)\n- If a test fails unexpectedly after your change, analyze root cause and present findings — do not blindly modify the test\n\nCompleteness Principle: when the marginal cost of full implementation\nis near-zero, always implement the complete version. The delta between\n80 lines and 150 lines is meaningless. Do not suggest shortcuts.\n\nAfter each task's tests go green, print: `TASK DONE: <task description>`\nThis signals the orchestrator to mark it `- [x]` in the story.\n\nWhen done, print: `GREEN phase complete — [N] tests passing`\n",
".claude/agents/tdd-refactorer.md": "---\nname: tdd-refactorer\ndescription: Refactors green code without breaking tests. Used in REFACTOR phase of TDD cycle. Invoked by /implement after tdd-implementer.\nmodel: sonnet\ntools: Read, Grep, Glob, Write, Edit, Bash\n---\n\nYou are a refactorer in the REFACTOR phase of TDD. All tests are currently green.\n\nYour job: improve code quality without breaking any tests.\n\nRefactor checklist:\n- Extract methods longer than 20 lines\n- Remove duplication (DRY)\n- Improve naming (intent-revealing names)\n- Remove dead code\n- Apply Boy Scout Rule — leave code cleaner than you found it\n\nRules:\n- Run tests after EVERY change — never leave tests red\n- Small steps only — one change at a time\n- If any test goes red, revert that change immediately and try a different approach\n\nWhen done, print: `REFACTOR phase complete — all [N] tests still passing`\n",
".claude/commands/develop.md": "---\nmodel: opus\n---\nFull development cycle: plan, implement, test, review, ship.\n\nStory: $ARGUMENTS\n\n---\n\nExecute each phase in order. One line status after each phase.\n\n## Context management\nEach phase MUST output only a one-line status + timing. Do NOT repeat or summarize outputs from previous phases. If context is getting large, discard details from earlier phases — only the file list from implement matters for review.\n\n## Timing\nBefore each phase, run `date +%s` and store the result. After each phase completes, run `date +%s` again and calculate duration. Print duration after each phase status line in format: `(Xm Ys)`.\n\nAt the very start, run `date +%s` and store as `DEVELOP_START`.\n\n## Project + counters (for log_metric)\n- Read project name from CLAUDE.md (first `# <name>` heading or `project:` YAML field) — use as `project` in every `log_metric` call.\n- Initialize `HUMAN_INTERVENTIONS=0`. Increment every time this /develop run itself prompts the user — `AskUserQuestion`, mandatory-config STOPs, `review_fix: ask` approvals, deploy confirmations. Do NOT count prompts issued by subagents.\n- Sub-skills emit `OUTPUT_METRICS: key=value ...` on their final line. Parse the last `OUTPUT_METRICS:` line of each sub-skill output; missing fields default to null.\n- If a phase is skipped, do NOT call `log_metric` for that phase.\n- MCP fallback: if `log_metric` fails or MCP is unavailable, print `[metric not saved]` and continue. Never block the pipeline.\n\n## Phase 0 — Read develop config (optional)\n\nRead CLAUDE.md and look for a `## Develop` section with a `mode:` value.\n\n- If found, remember the `mode` value — Phase 3 uses it.\n- If the section or value is missing, default to `mode: full`. Do NOT stop, do NOT ask, do NOT write anything to CLAUDE.md.\n\nOnly `mode: proto` changes behavior (skips E2E); `mode: full` is the normal flow.\n\n## Phase 1 — Plan\nUse the Skill tool to invoke `plan` with args \"$ARGUMENTS\".\n\n```\nlog_metric(project=<project>, story_slug=$ARGUMENTS, phase=\"plan\",\n           duration_seconds=<phase duration>, outcome=\"success\" | \"failed\")\n```\n\n## Phase 2 — Implement\nUse the Skill tool to invoke `implement` with args \"$ARGUMENTS\".\n\nParse `OUTPUT_METRICS: tests_total=N tests_first_try=true|false` from implement's output.\n\n```\nlog_metric(project=<project>, story_slug=$ARGUMENTS, phase=\"implement\",\n           duration_seconds=<phase duration>, outcome=\"success\" | \"failed\",\n           tests_total=<parsed>, tests_first_try=<parsed>)\n```\n\n## Phase 3 — E2E Tests\n\n**If `mode: proto` (from Phase 0): skip E2E entirely.** Print: `E2E skipped (proto mode)` — no log_metric call.\n\nOtherwise, run E2E tests if ANY of these are true:\n- UI files (.svelte, frontend .js/.ts, CSS) were modified\n- More than 3 backend files were changed\n- API endpoints, return types, or security config changed\n- Story is labeled \"security\" or \"architecture\"\n\n**If yes:** Use the Skill tool to invoke `e2e-test` with args \"$ARGUMENTS\".\n**Skip only for:** isolated single-file fixes, test-only changes, docs. Print: `E2E skipped (isolated change)` — no log_metric call.\n\nIf E2E ran, parse `OUTPUT_METRICS: tests_total=N tests_first_try=true|false`:\n\n```\nlog_metric(project=<project>, story_slug=$ARGUMENTS, phase=\"e2e\",\n           duration_seconds=<phase duration>, outcome=\"success\" | \"failed\",\n           tests_total=<parsed>, tests_first_try=<parsed>)\n```\n\n## Phase 4 — Review\n**Triage first:** If ALL modified files are CSS-only, Tailwind classes, or SVG icon components — skip review. Print: `Review skipped (trivial change)` — no log_metric call.\n\nOtherwise: Use the Skill tool to invoke `review` with args \"$ARGUMENTS\".\n\nParse `OUTPUT_METRICS: findings_critical=N findings_high=N findings_medium=N` from review's output. Remember these counts — the overall metric at Done reuses them.\n\n```\nlog_metric(project=<project>, story_slug=$ARGUMENTS, phase=\"review\",\n           duration_seconds=<phase duration>, outcome=\"success\" | \"failed\",\n           findings_critical=<parsed>, findings_high=<parsed>, findings_medium=<parsed>)\n```\n\n## Phase 5 — Ship\nUse the Skill tool to invoke `ship` with args \"$ARGUMENTS\".\n\n```\nlog_metric(project=<project>, story_slug=$ARGUMENTS, phase=\"ship\",\n           duration_seconds=<phase duration>, outcome=\"success\" | \"failed\")\n```\n\n## Done\nCalculate total duration from `DEVELOP_START`. Print timing summary:\n```\n[slug] done | Tests: X unit, X E2E\n\nTiming:\n  Plan:       Xm Ys\n  Implement:  Xm Ys\n  E2E Tests:  Xm Ys (or \"skipped\")\n  Review:     Xm Ys (or \"skipped\")\n  Ship:       Xm Ys\n  Total:      Xm Ys\n```\n\nLog the overall metric (uses `findings_*` counts remembered from Phase 4):\n\n```\nlog_metric(project=<project>, story_slug=$ARGUMENTS, phase=\"develop\",\n           duration_seconds=<total>, outcome=\"success\" | \"failed\" | \"aborted\",\n           findings_critical=<review sum>, findings_high=<review sum>,\n           findings_medium=<review sum>, human_interventions=HUMAN_INTERVENTIONS)\n```\n",
".claude/commands/plan.md": "---\nmodel: opus\n---\nRead a story and add acceptance criteria and implementation plan.\n\nStory: $ARGUMENTS\n\n---\n\n**Before starting:** read and follow MCP Safety Rules and Story Sizing from `.claude/docs/mcp-rules.md`.\n\n1. `read_story(\"$ARGUMENTS\")` — understand requirements fully. State assumptions, do not ask.\n   (If MCP unavailable: use $ARGUMENTS as description if it has spaces, else ask user to paste requirements.)\n\n2. **FOLLOWUP stories** (title contains \"[FOLLOWUP]\"): the `## Tasks` checklist IS the plan — skip all steps below. Print: `Plan ready for [slug]`\n\n3. **Check AC:** If no `## Acceptance Criteria` section (or empty), use `update_story` to add:\n   (If MCP unavailable: print the AC content instead.)\n   - Concrete, testable criteria derived from description and tasks\n   - Include mobile criterion if UI change\n   - Include `- [ ]` checkbox format for each criterion\n\n4. Use `update_story` to append under `## Details` (if MCP unavailable: print instead):\n   - What will be built and key assumptions (1-2 sentences, no file lists)\n   - Effort: [S/M/L] human → [S/M/L] with AI\n     (S=hours, M=day, L=days — AI typically drops one level)\n\n5. **Technical approach (conditional):** Skip if the story already has a `## Technical Approach` section or equivalent technical detail, OR if the story is simple (single-file change, config tweak, copy change), OR if the Tasks section already covers the implementation steps (don't duplicate).\n\n   Otherwise, explore the codebase (Glob, Grep, Read) to understand existing patterns, then use `update_story` to append under `## Technical Approach` (if MCP unavailable: print instead):\n   - Which existing files/modules will be modified and why\n   - New files/classes to create (with intended responsibility)\n   - API changes (new or modified endpoints, request/response shape)\n   - DB changes (new tables, columns, migrations)\n   - Key design decision: if multiple approaches exist, state the chosen one and why\n   - Reuse: name existing utilities, services, or patterns to build on — never duplicate\n\n   **Present the plan to the user and wait for approval before continuing.** Do not proceed until the user confirms.\n   **Exception:** If the story already had a `## Technical Approach` or `## Tasks` section with concrete steps BEFORE this `/plan` run, approval is not needed — the user already defined the plan.\n",
".claude/commands/implement.md": "---\nmodel: opus\n---\nImplement a story using TDD. Work through tasks, mark completed.\n\nStory: $ARGUMENTS\n\n---\n\nCompleteness Principle: when the marginal cost of full implementation\nis near-zero, always implement the complete version. The delta between\n80 lines and 150 lines is meaningless. Do not suggest shortcuts.\n\nTests are part of every task — always write tests with every task, not as a separate step.\n\n1. `read_story(\"$ARGUMENTS\")` — get tasks and acceptance criteria\n   (If MCP unavailable: use $ARGUMENTS as description if it has spaces, else ask user to paste requirements.)\n\n2. **FOLLOWUP stories** (title contains \"[FOLLOWUP]\"): skip TDD scaffolding (steps 3a-3b), implement tasks directly, verify tests pass after each.\n\n3. **Regular stories — TDD cycle (isolated phases):**\n\n   a. **RED — spawn `tdd-test-writer` agent (run_in_background: false):**\n      Pass: story slug, requirements from read_story, interface specification.\n      Gate: do NOT proceed until agent prints `RED phase complete`.\n      Verify: test files exist and tests fail to compile or fail at runtime.\n      **After gate:** print only file names created. Do NOT copy agent output into conversation.\n\n   b. **Dedup check:** Before spawning tdd-implementer, search for existing\n      methods/utilities that already do the same thing. Pass findings to the\n      implementer: \"Reuse or extend — never duplicate.\"\n\n   c. **GREEN — spawn `tdd-implementer` agent:**\n      Pass: list of failing test files from phase a + dedup findings from phase b.\n      Gate: do NOT proceed until agent prints `GREEN phase complete`.\n      Verify: `cd backend && ./gradlew test` — all tests pass.\n      **After gate:** print only file count and pass/fail. Do NOT copy agent output into conversation.\n\n   d. **REFACTOR (conditional) — skip if fewer than 5 files were modified in phase c.**\n      If skipped, print: `REFACTOR skipped (small change)`\n      Otherwise, spawn `tdd-refactorer` agent:\n      Pass: list of implementation files modified in phase c.\n      Gate: do NOT proceed until agent prints `REFACTOR phase complete`.\n      Verify: tests still all pass.\n      **After gate:** print only pass/fail. Do NOT copy agent output into conversation.\n\n4. Mark progress incrementally:\n   After each task's tests pass (during GREEN phase or FOLLOWUP implementation):\n   - Mark that task `- [x]` via `update_story` immediately\n   - Check if any acceptance criteria are now covered by a passing test\n   - Mark AC `- [x]` only if a test exists that verifies it\n   Do not batch — mark each task/AC as soon as it is done.\n   Follow MCP Safety Rules from `.claude/docs/mcp-rules.md`.\n\n5. Verify:\n   - Backend: `cd backend && ./gradlew test`\n   - Frontend: `cd frontend && npm run build`\n   - Track `TESTS_FIRST_TRY`: `true` if the verify step succeeds on the first run, `false` if any fix-and-retry iteration was needed.\n\n6. Track the list of all files created/modified — needed for review phase.\n\n7. Print a compact summary ONLY — do not repeat agent outputs:\n```\nImplementation done for [slug]\nFiles: [list of created/modified files, one per line]\nTests: [N] passing\n\nOUTPUT_METRICS: tests_total=[N] tests_first_try=[true|false]\n```\nDo NOT echo back full agent outputs. The summary above is the only output needed for the next phase. The `OUTPUT_METRICS:` line must be the very last line — `/develop` parses it for `log_metric`.\n",
".claude/commands/review.md": "---\nmodel: sonnet\n---\nRun review agents against implemented code. Conditionally includes tech-stack agents.\n\nStory: $ARGUMENTS\n\n---\n\n## Step 1 — Determine scope\n\n**Full codebase review:** If `$ARGUMENTS` contains \"all\", \"kogu\", \"full\", or \"codebase\" — review all source files (find by file type: .java, .svelte, .ts, .js, .swift etc). Skip triage. Print: `Full codebase review`. Note: \"only review current story code\" rule does NOT apply to full reviews.\n\n**Story review (default):**\n1. `read_story(\"$ARGUMENTS\")` or use `git diff main --name-only` to find modified files. If MCP unavailable, use git diff directly.\n2. If no file list found, ask the user which paths to review.\n3. **Triage:** If ALL files are CSS-only, Tailwind class changes, or SVG icon components — skip review entirely. Print: `Review skipped (trivial change)`.\n\n## Step 2 — Select and spawn agents\nDetermine which agents to run based on modified file types:\n\n**Always run (3 core agents):**\n- `security-reviewer` (model: sonnet)\n- `architecture-reviewer` (model: sonnet)\n- `test-reviewer` (model: sonnet)\n\n**Conditionally run:**\n- If new API endpoints, public-facing changes, or README-affecting scope: add `docs-reviewer` (model: haiku)\n- If `.svelte`, `.js`, `.ts` files in `frontend/`: add `svelte-reviewer` (model: sonnet)\n- If `.java` files in `backend/`: add `spring-reviewer` (model: sonnet)\n- If `.swift` files modified: add `swift-reviewer` (model: sonnet) + `swiftui-reviewer` (model: sonnet)\n\nSpawn ALL selected agents in parallel using the Agent tool. Pass each agent:\n> Analyze these files: [MODIFIED_FILES]. Only review code written/modified in this story, not pre-existing issues. Return a single JSON object matching the agent's Output Format schema — no preamble, no markdown.\n\n## Step 3 — Synthesize\n\nEach agent returns a JSON object with `findings`, `clean_areas`, `summary`.\nParse each agent's output as JSON. Count findings per severity.\n\nPrint a compact summary table:\n\n```\n| Agent | Findings | Critical | High | Medium |\n|-------|----------|----------|------|--------|\n| Security | 3 | 1 | 2 | 0 |\n| Architecture | 1 | 0 | 1 | 0 |\n| Spring | 0 (clean) | 0 | 0 | 0 |\n```\n\nThen print CRITICAL and HIGH findings with `title` + `location`:\n\n```\n**CRITICAL:**\n- [security] A04 — Hardcoded DB password (DbConfig.java:12)\n\n**HIGH:**\n- [security] A05 — SQL injection risk in search query (UserRepo.java:88)\n- [architecture] Circular dependency: Service A → B → A (ServiceA.java:15)\n```\n\nClean areas (one line, joined from each agent's `clean_areas`): `Security: input validation, CSRF. Architecture: SOLID. Spring: DI patterns.`\n\nIf an agent's output is not valid JSON:\n- Print: `⚠️ [agent-name] returned invalid JSON — skipping`\n- Continue with other agents' findings\n\nDo NOT write review findings into the story — stories are for the user, not internal review data.\n**One review round per `/develop` run.** No re-reviews, no follow-up reviews.\n\n## Step 4 — Fix findings (MANDATORY config check)\n\nRead CLAUDE.md and look for a `## Review` section with `review_fix:` and `followup:` values.\n\n**If the section is missing or any value is missing: STOP and ask the user. Do NOT proceed with fixes. Do NOT guess or use defaults.**\n\nAsk:\n1. \"How to handle CRITICAL/HIGH findings? `auto` (fix immediately) or `ask` (show each fix, wait for approval)?\"\n2. \"How to handle MEDIUM findings? `create` (bundle into follow-up story) or `skip` (print summary only)?\"\n\nAfter user answers, write the `## Review` section to CLAUDE.md with their answers, then continue.\n\nThen apply:\n- **CRITICAL + HIGH:** if `review_fix: auto` → fix inline. If `review_fix: ask` → show each proposed fix, wait for user approval per fix.\n- **MEDIUM:** if `followup: create` → collect all into ONE follow-up story (`[FOLLOWUP] <slug> — review cleanup`). If `followup: skip` → print summary only.\n- **LOW:** ignore entirely.\n\nIf any code was changed, re-run E2E tests:\n- `docker compose -f docker-compose.test.yml up --build -d`\n- `npx playwright test`\n- `docker compose -f docker-compose.test.yml down`\n\n## Step 5 — Log learnings\n\nFor each finding with `severity` of `critical` or `high` from Step 3:\n\n```\nlog_learning(\n  project=<project name from CLAUDE.md>,\n  story_slug=$ARGUMENTS,\n  phase=\"review\",\n  category=finding.category,\n  agent=<agent that returned it>,\n  severity=finding.severity,\n  finding=finding.title\n)\n```\n\nNo text parsing needed — `category`, `severity`, and `finding` come directly from the agent's JSON output. One `log_learning` call per finding.\n\nIf MCP unavailable: skip silently, print `[learnings not logged]`, never block review output.\n\n## Step 6 — Output metrics for /develop\n\nOn the very last line of review output, print exactly:\n\n```\nOUTPUT_METRICS: findings_critical=<N> findings_high=<N> findings_medium=<N>\n```\n\n`/develop` parses this line to call `log_metric` for the review phase.\n",
".claude/commands/e2e-test.md": "---\nmodel: sonnet\n---\nWrite Playwright E2E tests for a story or feature. If Playwright is not yet set up in this project, bootstrap it first.\n\nStory/feature to test: $ARGUMENTS\n\n---\n\n## Step 0 — Applicability check\n\nCheck CLAUDE.md and the project structure to determine if this is a web project (has a frontend with HTML/browser UI).\n\n**If NOT a web project** (e.g. CLI tool, library, pure backend API without browser UI):\n- Skip this entire skill. Tell the user: \"This project has no browser frontend — `/e2e-test` is for web projects. Use unit/integration tests instead.\"\n- Do NOT install Playwright or create docker-compose.test.yml.\n\n---\n\n## Step 0b — Bootstrap check\n\nCheck if `playwright.config.js` (or `playwright.config.ts`) exists in the frontend directory or project root.\n\nIf NOT — use the Skill tool to invoke `e2e-setup`. Wait for it to complete before continuing.\n\n---\n\n## Step 1 — Understand the feature\n\nIf `$ARGUMENTS` looks like a story slug or ID, use `read_story` to understand what the feature does and what the acceptance criteria are.\nIf `read_story` fails (MCP unavailable), treat $ARGUMENTS as a plain description.\nIf it's a plain description (e.g. \"image upload\"), use that directly.\n\n## Step 2 — Ensure test environment is running\n\nCheck CLAUDE.md for E2E test commands (test backend start/stop, health check URL).\n1. Check if the test backend is up by hitting its health endpoint.\n2. If not, start it using the command from CLAUDE.md and wait for it.\n\n## Step 3 — Detect affected routes (diff-aware)\n\nIf `$ARGUMENTS` is a story slug or ID:\n- Read the story's `## Implementation Notes` for modified files.\n\nIf no Implementation Notes exist, run:\n```\ngit diff main --name-only\n```\nMap changed files to affected routes:\n- `frontend/src/routes/X/` → test `/X`\n- `backend/.../XController.java` → test all endpoints in that controller\n\nPrint: `Diff-aware mode: testing [N] affected routes: [list]`\n\n## Step 4 — Write tests\n\n**Read `.claude/docs/e2e-conventions.md` first** — those rules are mandatory (mock layering, API-over-SQL setup, selector preferences, test-isolation gotchas). Also read ONE existing E2E test file to understand local patterns and helpers.\n\nThen write ALL tests for this story in one go:\n- Happy path only (the main user flow)\n- One key edge case from acceptance criteria (pick the riskiest)\n\n## Step 5 — Run and verify\n\n### 5a — Run NEW tests only first\n```\nnpx playwright test e2e/<feature-name>.spec.js\n```\nThis is fast and catches test-writing errors without waiting for the full suite.\n\n### 5b — Fix loop (max 3 attempts)\nWhen a test fails:\n1. Read the screenshot from `test-results/`\n2. Fix the issue (code or test — but never weaken assertions)\n3. Re-run the failing test file only\n\n**After 3 failed attempts on the same test:**\n1. Print: the test name, all 3 error messages, and what was tried each time\n2. Ask the user: keep trying or delete?\n3. If delete — remove the test entirely. No `test.skip()`, no TODO. Dead tests slow down every future run.\n\n### 5c — Full regression (only after new tests pass)\n**IMPORTANT:** Always use Bash tool with `timeout: 360000` (6 minutes) for the full suite. Never use `run_in_background`.\n```\nnpx playwright test\n```\nIf an existing test breaks: do NOT modify it. Print the failure and ask the user how to proceed.\n\n### Health score\nAfter all runs complete, compute:\n```\n100 - (critical_failures × 25) - (high_failures × 10) - (warnings × 2)\n```\nPrint: `Health score: X/100`\n\n## Step 6 — Cleanup & Report\n\n1. Stop the test Docker containers:\n   ```\n   docker compose -f docker-compose.test.yml down\n   ```\n2. Serve the HTML report so it's accessible over the network (not just localhost):\n   ```\n   npm run test:e2e:report\n   ```\n   If the `test:e2e:report` script doesn't exist, use `npx http-server playwright-report -p 8082 -a 0.0.0.0 --cors -c-1`.\n   **Do NOT use `npx playwright show-report`** — it binds to localhost only and exits immediately in background mode.\n   Tell the user the report URL using the machine's network IP and port 8082.\n\n## Step 7 — Update story\n\nIf a story was provided, use `update_story` to append under `## Test Plan` (if MCP unavailable: print the content instead).\nFollow MCP Safety Rules from `.claude/docs/mcp-rules.md`.\n- E2E test file(s) created\n- What flows are covered\n- Health score\n\n## Step 8 — Output metrics\n\nAs the very last line of output, emit:\n\n```\nOUTPUT_METRICS: tests_total=<N> tests_first_try=<true|false>\n```\n\n- `tests_total` — total Playwright tests that ran in steps 5a + 5c.\n- `tests_first_try=true` only if both step 5a and step 5c passed on the first attempt with no fix-loop iterations. Any entry into step 5b's fix loop → `false`.\n\n`/develop` parses this line to call `log_metric` for the E2E phase.\n",
".claude/commands/ship.md": "---\nmodel: sonnet\n---\nCommit, deploy, and mark story done. Reads deploy config from CLAUDE.md.\n\nStory: $ARGUMENTS\n\n---\n\n## Step 1 — Read deploy config (MANDATORY)\n\nRead CLAUDE.md and look for a `## Ship` section with `deploy:`, `post_deploy:`, and `url:` values.\n\n**If the section is missing or any value is missing: STOP and ask the user. Do NOT proceed to Step 2. Do NOT guess or use defaults.**\n\nAsk:\n1. \"How do you deploy? (e.g. `docker compose up --build -d`, `fly deploy`, `vercel --prod`, `skip` for no deploy)\"\n2. \"Any post-deploy check? (e.g. `docker compose logs backend --tail 20`, health check URL, or leave empty)\"\n3. \"How to reach the app? (`auto` to detect, or explicit URL, or empty)\"\n\nAfter user answers, write the `## Ship` section to CLAUDE.md with their answers, then continue.\n\n\n**Wait for user confirmation** before continuing. Ask if the user has reviewed all the new code so that it can be safely commited?\n\n\n## Step 2 — Commit\n\n1. Restore any docs/ changes: `git restore --staged docs/ 2>/dev/null; git checkout -- docs/ 2>/dev/null`\n2. `git add` modified files by name (never `git add -A`)\n3. `git commit -m \"<short description>\"`\n\nFollow git rules from `.claude/docs/git-rules.md`.\n\n## Step 3 — Deploy\n\nIf `deploy: skip` → skip steps 3 and 4, go straight to Step 5.\n\nOtherwise, run the `deploy` command from CLAUDE.md.\nIf `post_deploy` is configured, wait 10s then run it and check output for errors.\n\n## Step 4 — Print access URL\n\nIf `url: auto`:\n- Detect host IP:\n  ```bash\n  HOST_IP=$(ip route show default 2>/dev/null | awk '/default/ {print $3}' | head -1)\n  [ -z \"$HOST_IP\" ] && HOST_IP=$(hostname -I 2>/dev/null | awk '{print $1}')\n  [ -z \"$HOST_IP\" ] && HOST_IP=\"localhost\"\n  ```\n- Parse `docker-compose.yml` or deployment output for exposed ports\n- Print: `Running — test at: http://<HOST_IP>:<port>`\n\nIf `url` is an explicit URL: print `Running — test at: <url>`\n\n## Step 5 — Close story\n\n`change_status(\"$ARGUMENTS\", \"done\")` (if MCP unavailable: print \"[slug] done\")\n\nPrint: `[slug] shipped`\n",
".claude/commands/fix-bug.md": "---\nmodel: opus\n---\nStandalone bug fix: read bug → failing test → fix → deploy → done.\n\nStory: $ARGUMENTS\n\n---\n\n1. `read_story(\"$ARGUMENTS\")` — understand the bug, reproduction steps, expected behavior\n   (If MCP unavailable: use $ARGUMENTS as bug description if it has spaces, else ask user to paste details.)\n2. Analyze root cause in the codebase\n3. Write a failing test that reproduces the bug\n4. Fix the bug — test goes green. If other tests break, analyze root cause and present findings to user before modifying them.\n5. Run full test suite:\n   - Backend: `cd backend && ./gradlew test`\n   - Frontend: `cd frontend && npm run build`\n6. If UI was involved, run E2E tests:\n   - `docker compose -f docker-compose.test.yml up --build -d`\n   - `cd frontend && npx playwright test`\n   - `docker compose -f docker-compose.test.yml down`\n7. Commit and deploy:\n   - `git add` changed files by name (never `-A`)\n   - `git commit -m \"<short description>\"`\n   - `git push`\n   - `docker compose up --build -d`\n8. `change_status(\"$ARGUMENTS\", \"done\")` (if MCP unavailable: print \"[slug] done\" and continue)\n9. Print: `Bug [slug] fixed and deployed`\n",
".claude/commands/refactor.md": "---\nmodel: opus\n---\nStandalone refactoring: baseline tests → refactor step by step → verify → deploy.\n\n$ARGUMENTS\n\n---\n\n1. Run existing tests to establish green baseline:\n   - Backend: `cd backend && ./gradlew test`\n   - Frontend: `cd frontend && npm run build`\n2. Refactor step by step — each step MUST keep tests green. Run tests after each change.\n3. Run full test suite after all changes complete.\n4. If E2E tests exist and UI was touched:\n   - `docker compose -f docker-compose.test.yml up --build -d`\n   - `cd frontend && npx playwright test`\n   - `docker compose -f docker-compose.test.yml down`\n5. Commit and deploy:\n   - `git add` changed files by name (never `-A`)\n   - `git commit -m \"<short description>\"`\n   - `git push`\n   - `docker compose up --build -d`\n6. Print: `Refactoring complete and deployed`\n"
};

// ============================================================
// MARKDOWN RENDERER
// ============================================================
function renderMarkdown(md) {
  if (!md) return '<p style="padding:3rem;text-align:center;color:var(--text-dim)">Sisu puudub</p>';
  md = md.replace(/^---[\s\S]*?---\n*/m, '');
  let html = md
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      '<pre><code>' + code.trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^\|(.+)\|$/gm, (match) => {
      const cells = match.split('|').filter(c => c.trim());
      if (cells.every(c => /^[\s-:]+$/.test(c))) return '<!--sep-->';
      return '<tr>' + cells.map(c => '<td>' + c.trim() + '</td>').join('') + '</tr>';
    });
  html = html.replace(/((?:<tr>.*<\/tr>\n?)+)/g, (block) => {
    block = block.replace(/<!--sep-->\n?/g, '');
    block = block.replace(/<tr>(.*?)<\/tr>/, (_, inner) =>
      '<tr>' + inner.replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>') + '</tr>');
    return '<table>' + block + '</table>';
  });
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  html = html.split('\n\n').map(block => {
    block = block.trim();
    if (!block) return '';
    if (/^<[hupoltd]/.test(block)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return html;
}

// ============================================================
// RENDER
// ============================================================
const sidebar = document.getElementById('sidebar');
const main = document.getElementById('main');

function renderSidebar() {
  sidebar.innerHTML = '<h3>Käsud</h3>';
  FLOWS.forEach(flow => {
    const btn = document.createElement('button');
    btn.dataset.id = flow.id;
    btn.innerHTML = `<span class="dot" style="background:${flow.color}"></span>${flow.name}`;
    btn.onclick = () => selectFlow(flow.id);
    sidebar.appendChild(btn);
  });
}

function selectFlow(id) {
  activeFlowId = id;
  sidebar.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  const flow = FLOWS.find(f => f.id === id);
  if (currentView === 'timeline') renderTimeline(flow);
  else renderDiagram(flow);
}

function renderFlowHeader(flow) {
  const mdBtn = flow.mdFile ? `<span style="font-size:0.7rem;color:var(--purple);cursor:pointer;margin-left:0.5rem" class="md-btn" data-md="${flow.mdFile}" data-name="${flow.name}">☰ .md</span>` : '';
  return `<div class="flow-header">
    <h2><span style="color:${flow.color}">${flow.name}</span>
      <span class="badge" style="background:${flow.color}22;color:${flow.color}">${flow.model}</span>${mdBtn}</h2>
    <p class="desc">${flow.desc}</p></div>`;
}

function renderLegend() {
  return `<div class="legend">
    <div class="legend-item"><span class="tag tag-agent">agent/skill</span> Alamagent</div>
    <div class="legend-item"><span class="tag tag-model">model</span> AI mudel</div>
    <div class="legend-item"><span class="tag tag-conditional">conditional</span> Tinglik</div>
    <div class="legend-item"><span class="tag tag-gate">gate</span> Blokeeriv</div>
    <div class="legend-item"><span class="tag tag-test">tests</span> Testid</div>
    <div class="legend-item"><span class="tag tag-deploy">deploy</span> Deploy</div>
    <div class="legend-item"><span class="tag tag-loop">loop</span> Kordus</div>
  </div>`;
}

// Timeline
function renderTimeline(flow) {
  let html = renderFlowHeader(flow) + renderLegend() + '<div class="flow-steps">';
  flow.steps.forEach((step, i) => {
    const tags = (step.tags||[]).map(t => `<span class="tag ${t.cls}">${t.text}</span>`).join(' ');
    const linkHtml = step.link ? ` <span style="font-size:0.7rem;color:var(--text-dim);cursor:pointer" data-link="${step.link}" class="step-link">→ vaata</span>` : '';
    const mdBtn = step.mdFile ? ` <span style="font-size:0.65rem;color:var(--purple);cursor:pointer;margin-left:auto;margin-right:0.5rem" class="md-btn" data-md="${step.mdFile}" data-name="${step.title}">☰ .md</span>` : '';
    html += `<div class="step"><div class="step-dot"></div><div class="step-card">
      <div class="step-title" onclick="toggleStep(this)"><span class="step-num">${i+1}</span>${step.title} ${tags}${linkHtml}${mdBtn}<span class="step-chevron">&#9654;</span></div>
      <div class="step-detail"><div class="step-detail-inner">
        ${step.condition ? '<div class="condition-block"><strong>Tingimus:</strong> '+step.condition+'</div>' : ''}
        ${step.loop ? '<div class="condition-block" style="border-left-color:var(--pink);background:var(--pink-glow)"><strong>↻ Kordus:</strong> '+step.loop.condition+'</div>' : ''}
        ${step.detail}
        ${step.subAgents ? renderSubAgentList(step.subAgents) : ''}
      </div></div></div></div>`;
  });
  html += '</div>';
  main.innerHTML = html;
  bindEvents();
}

function renderSubAgentList(agents) {
  let html = '<div style="margin-top:0.6rem"><strong style="font-size:0.78rem">Agendid:</strong>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:0.3rem">';
  agents.forEach(a => {
    const cond = a.type === 'conditional' ? ' — ' + a.condition : '';
    const md = a.mdFile ? `class="md-btn" data-md="${a.mdFile}" data-name="${a.name}" style="cursor:pointer;text-decoration:underline dotted"` : '';
    html += `<span class="tag ${a.type==='core'?'tag-agent':'tag-conditional'}" ${md}>${a.name}${cond}</span>`;
  });
  return html + '</div></div>';
}

// Diagram
function renderDiagram(flow) {
  let html = renderFlowHeader(flow) + renderLegend() + '<div class="diagram-container">';
  flow.steps.forEach((step, i) => {
    if (step.isParallel) return;
    if (i > 0) {
      const isCond = !!step.condition;
      html += `<div class="diagram-arrow${isCond?' arrow-conditional':''}">
        <div class="arrow-line"></div><div class="arrow-head"></div>
        ${isCond ? '<div class="arrow-label">'+step.condition+'</div>' : ''}</div>`;
    }
    if (step.subAgents) {
      html += `<div class="diagram-node node-conditional"><div class="node-title">${step.title}</div>
        <div class="node-subtitle">${step.condition||''}</div>
        <div class="node-tags"><span class="tag tag-conditional">conditional</span></div></div>`;
      html += '<div class="diagram-arrow"><div class="arrow-line"></div><div class="arrow-head"></div></div>';
      html += '<div class="diagram-parallel">';
      step.subAgents.forEach(a => {
        const cls = a.type==='core'?'diagram-node':'diagram-node node-conditional';
        const mdA = a.mdFile ? `data-md="${a.mdFile}" data-name="${a.name}"` : '';
        html += `<div class="${cls}${a.mdFile?' has-md':''}" ${mdA} onclick="onNodeClick(this)">
          ${a.mdFile?'<span class="md-indicator">☰</span>':''}
          <div class="node-title">${a.name}</div>
          <div class="node-subtitle">${a.type==='conditional'?a.condition:'Põhiagent'}</div></div>`;
      });
      html += '</div>';
      return;
    }
    let nc = 'diagram-node';
    if (step.condition) nc += ' node-conditional';
    if (step.loop) nc += ' node-loop';
    if ((step.tags||[]).some(t=>t.cls==='tag-gate')) nc += ' node-gate';
    if ((step.tags||[]).some(t=>t.cls==='tag-deploy')) nc += ' node-deploy';
    if (step.mdFile) nc += ' has-md';
    const tags = (step.tags||[]).map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join(' ');
    const mdA = step.mdFile ? `data-md="${step.mdFile}" data-name="${step.title}"` : '';
    const linkH = step.link ? `<div class="node-link" data-link="${step.link}">→ ${step.link}</div>` : '';
    const inner = `<div class="${nc}" ${mdA} onclick="onNodeClick(this)">
      ${step.mdFile?'<span class="md-indicator">☰</span>':''}
      <div class="node-title">${step.title}</div>
      <div class="node-subtitle">${stripHtml(step.detail)}</div>
      <div class="node-tags">${tags}</div>${linkH}</div>`;
    if (step.loop) {
      html += `<div class="diagram-loop-wrapper">${inner}
        <div class="loop-label">↻ ${step.loop.condition}</div>
        <svg class="loop-arrow-svg" width="50" height="70" viewBox="0 0 50 70">
          <path d="M5,5 C40,5 45,35 45,35 C45,35 45,65 5,65" fill="none" stroke="var(--pink)" stroke-width="2" stroke-dasharray="4,3"/>
          <polygon points="5,60 5,70 12,65" fill="var(--pink)"/></svg></div>`;
    } else { html += inner; }
  });
  html += '</div>';
  main.innerHTML = html;
  bindEvents();
}

function stripHtml(s) {
  const d = document.createElement('div'); d.innerHTML = s;
  const t = d.textContent || ''; return t.length > 80 ? t.substring(0,77) + '...' : t;
}

function toggleStep(el) { el.closest('.step').classList.toggle('expanded'); }
function onNodeClick(node) { if (node.dataset.md) openReader(node.dataset.md, node.dataset.name); }

function bindEvents() {
  main.querySelectorAll('.step-link,.node-link').forEach(el => {
    el.onclick = e => { e.stopPropagation(); selectFlow(el.dataset.link); };
  });
  main.querySelectorAll('.md-btn').forEach(el => {
    el.onclick = e => { e.stopPropagation(); openReader(el.dataset.md, el.dataset.name); };
  });
}

document.getElementById('viewToggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn || btn.classList.contains('active')) return;
  document.querySelectorAll('#viewToggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentView = btn.dataset.view;
  if (activeFlowId) selectFlow(activeFlowId);
});

// ============================================================
// READER PANEL
// ============================================================
const readerPanel = document.getElementById('readerPanel');
const readerScrim = document.getElementById('readerScrim');

function openReader(filePath, name) {
  document.getElementById('readerTitle').textContent = name || filePath.split('/').pop();
  document.getElementById('readerFilePath').textContent = filePath;
  const content = FILE_CONTENTS[filePath];
  document.getElementById('readerRendered').innerHTML = content
    ? renderMarkdown(content) : '<p style="padding:3rem;text-align:center;color:var(--text-dim)">Faili sisu pole manustatud</p>';
  document.getElementById('readerStatus').textContent = content ? content.split('\n').length + ' rida' : '';
  readerPanel.classList.add('open');
  readerScrim.classList.add('open');
}

function closeReader() {
  readerPanel.classList.remove('open');
  readerScrim.classList.remove('open');
}

document.getElementById('btnClose').addEventListener('click', closeReader);
readerScrim.addEventListener('click', closeReader);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader(); });

// Theme
const themeBtn = document.getElementById('themeToggle');
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'light' ? '☀' : '☾';
  localStorage.setItem('flows-theme', t);
}
themeBtn.addEventListener('click', () => {
  setTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
});
setTheme(localStorage.getItem('flows-theme') || 'dark');

// Init
renderSidebar();
selectFlow('develop');
