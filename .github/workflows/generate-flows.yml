name: Deploy Flow Visualizer

on:
  push:
    branches: [master]
    paths:
      - '.claude/agents/*.md'
      - '.claude/commands/*.md'
      - 'docs/generate-flows.js'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node docs/generate-flows.js

      - name: Commit if changed
        run: |
          git diff --quiet docs/flows.html && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/flows.html
          git commit -m "docs: regenerate flows.html"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - id: deployment
        uses: actions/deploy-pages@v4
